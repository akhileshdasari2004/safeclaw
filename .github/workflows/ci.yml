name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          cd apps/backend
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: cd apps/backend && ruff check app tests
      - name: Run pytest
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
          ENCRYPTION_KEY: ci-test-encryption-key-for-tests!!
        run: cd apps/backend && pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build -w @safeclaw/shared-types
      - run: npm run lint -w @safeclaw/frontend
      - run: npm run test -w @safeclaw/frontend
      - run: npm run build -w @safeclaw/frontend
